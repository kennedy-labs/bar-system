<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bar System V2</title>

<style>
body { font-family: Arial; padding:10px; background:#f5f5f5; }

h2 { text-align:center; }

.card {
  background:#fff;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.row {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:5px 0;
}

input {
  padding:5px;
  width:80px;
}

button {
  padding:8px;
  border:none;
  border-radius:6px;
  background:#333;
  color:#fff;
}

.big {
  font-size:18px;
  font-weight:bold;
}

.result {
  text-align:center;
  font-size:20px;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>Bar Daily Record</h2>

<div class="card">
Worker: <input id="worker"><br><br>
Date: <input type="date" id="date">
</div>

<div class="card">
<h3>Stock</h3>
<div id="stockList"></div>
<div class="big">Total Sales: <span id="totalSales">0</span></div>
</div>

<div class="card">
<h3>Expenses</h3>
<div id="expenseList"></div>
<button onclick="addExpense()">+ Add Expense</button>
<div>Total: <span id="totalExpenses">0</span></div>
</div>

<div class="card">
<h3>MPesa</h3>
<input id="mpesaInput" type="number">
<button onclick="addMpesa()">Add</button>
<div id="mpesaList"></div>
<div>Total: <span id="mpesaTotal">0</span></div>
</div>

<div class="card">
Cash: <input id="cash" type="number" oninput="finalCalc()">

<div>Required: <span id="required">0</span></div>
<div>Income: <span id="income">0</span></div>

<div class="result" id="result"></div>

<button onclick="saveData()">Save Day</button>
</div>

<script>

const items = [
["Tusker",250],
["Guinness",300],
["Hunter",400]
];

let mpesaArr = [];
let expensesArr = [];

function renderStock(){
let html = "";

items.forEach((it,i)=>{
html += `
<div class="row">
<span>${it[0]}</span>
<input placeholder="Sold" id="s${i}" oninput="calc()">
<span>${it[1]}</span>
<span id="amt${i}">0</span>
</div>`;
});

document.getElementById("stockList").innerHTML = html;
}

renderStock();

function calc(){
let total = 0;

items.forEach((it,i)=>{
let sold = Number(document.getElementById("s"+i).value)||0;
let amt = sold * it[1];

document.getElementById("amt"+i).innerText = amt;
total += amt;
});

document.getElementById("totalSales").innerText = total;
finalCalc();
}

function addExpense(){
let name = prompt("Expense name:");
let amt = Number(prompt("Amount:"));

if(!name || !amt) return;

expensesArr.push({name, amt});
renderExpenses();
}

function renderExpenses(){
let total = 0;
let html = "";

expensesArr.forEach(e=>{
total += e.amt;
html += `<div>${e.name} - ${e.amt}</div>`;
});

document.getElementById("expenseList").innerHTML = html;
document.getElementById("totalExpenses").innerText = total;

finalCalc();
}

function addMpesa(){
let val = Number(document.getElementById("mpesaInput").value)||0;
if(!val) return;

mpesaArr.push(val);
document.getElementById("mpesaInput").value="";

renderMpesa();
}

function renderMpesa(){
let total = 0;
let html = "";

mpesaArr.forEach(v=>{
total += v;
html += `<div>${v}</div>`;
});

document.getElementById("mpesaList").innerHTML = html;
document.getElementById("mpesaTotal").innerText = total;

finalCalc();
}

function finalCalc(){
let sales = Number(totalSales.innerText)||0;
let exp = Number(totalExpenses.innerText)||0;
let mpesa = Number(mpesaTotal.innerText)||0;
let cash = Number(cash.value)||0;

let required = sales - exp;
let income = mpesa + cash;

required.innerText = required;
income.innerText = income;

let diff = income - required;

if(diff > 0){
result.innerText = "TIP: " + diff;
}else if(diff < 0){
result.innerText = "SHORT: " + diff;
}else{
result.innerText = "BALANCED";
}
}

function saveData(){
alert("Next step: connect Firebase cleanly");
}

</script>

</body>
</html>
