<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bar System</title>

<style>
body { font-family: Arial; padding: 10px; }
table { width: 100%; border-collapse: collapse; }
td, th { border: 1px solid #ccc; padding: 4px; text-align: center; }
input { width: 70px; }
.section { margin-top: 20px; }
button { padding: 8px; margin-top: 5px; }
.box { border:1px solid #ccc; padding:10px; margin-top:10px; }
</style>
<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
 import { getFirestore, addDoc, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyDWmrVQNOpYSLJVt3s_ahq5yBkiykn1qtw",
    authDomain: "bar-system-6b7a3.firebaseapp.com",
    projectId: "bar-system-6b7a3",
    storageBucket: "bar-system-6b7a3.firebasestorage.app",
    messagingSenderId: "823216455050",
    appId: "1:823216455050:web:491e401ad569da3808dc73"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  async function loadLastStock(){

const q = query(collection(db, "records"), orderBy("time", "desc"), limit(1));
const snapshot = await getDocs(q);

if(snapshot.empty) return;

let last = snapshot.docs[0].data();

if(!last.stock) return;

last.stock.forEach((item,i)=>{
document.getElementById("o"+i).value = item.closing || 0;
});

calc();
}

window.onload = loadLastStock;

  async function loadRecords(){

const snapshot = await getDocs(collection(db, "records"));

let html = "";

snapshot.forEach(doc=>{
let d = doc.data();

html += `<div style="border:1px solid #ccc; margin:5px; padding:5px;">
${d.date} — ${d.worker} — ${d.result}
</div>`;
});

document.getElementById("records").innerHTML = html;
}

window.loadRecords = loadRecords;
async function saveData(){

let stock = [];

items.forEach((it,i)=>{
  stock.push({
    item: it[0],
    opening: document.getElementById("o"+i).value,
    added: document.getElementById("a"+i).value,
    sold: document.getElementById("s"+i).value,
    closing: document.getElementById("c"+i).innerText
  });
});

let data = {
  worker: document.getElementById("worker").value,
  date: document.getElementById("date").value,
  stock: stock,
  totalSales: document.getElementById("totalSales").innerText,
  expenses: document.getElementById("totalExpenses").innerText,
  mpesa: document.getElementById("mpesaTotal").innerText,
  cash: document.getElementById("cash").value,
  result: document.getElementById("result").innerText,
  time: Date.now()
};

await addDoc(collection(db, "records"), data);

alert("Saved to database!");
}
  window.saveData = saveData;
</script>
</head>
<body>

<h2>Bar Daily Record</h2>
  
<button onclick="loadRecords()">View Records</button>
<div id="records"></div>
  
Worker: <input id="worker"><br><br>
Date: <input type="date" id="date"><br>

<div class="section">
<h3>Stock</h3>

<table id="table">
<tr>
<th>Item</th><th>Opening</th><th>Add</th><th>Total</th>
<th>Sales</th><th>Price</th><th>Closing</th><th>Amount</th>
</tr>
</table>

<h3>Total Sales: <span id="totalSales">0</span></h3>
</div>

<div class="section box">
<h3>Expenses</h3>
<div id="expenses"></div>
<button onclick="addExpense()">Add Expense</button>
<h4>Total Expenses: <span id="totalExpenses">0</span></h4>
</div>

<div class="section box">
<h3>MPesa</h3>
<input type="number" id="mpesaInput" step="0.01">
<button onclick="addMpesa()">Add</button>

<div id="mpesaList"></div>

<h4>Total MPesa: <span id="mpesaTotal">0</span></h4>
</div>

<div class="section box">
Cash: <input type="number" id="cash" step="0.01" oninput="finalCalc()"><br><br>

<h4>Required: <span id="required">0</span></h4>
<h4>Total Income: <span id="income">0</span></h4>
<h3 id="result"></h3>
  <button onclick="saveData()">Save Day</button>
</div>

<script>

const items = [
["HUNTERS (400)",400],["FLY HORSE",150],["KIBAO (300)",300],
["ORIGIN (300)",300],["G.MEAKINS",300],["TRIPPLE ACE",300],
["NAPS",300],["GILBEYS (550)",550],["BEST GIN (400)",400],
["BEST VODKA",300],["LEMONADE",70],["PREDATOR",80],
["VICEROY (550)",550],["CAPRICE",1000],["SMART",170],
["GUARANA",250],["PINEAPPLE",250],["BLACK ICE",250],
["GUINNESS CAN",300],["TUSKER CAN",300],["WHITE CAP CAN",300],
["T CIDER CAN",300],["NOVIDA",60],["MINUTE",100],
["MIRINDA",50],["MANYATTA",300],["SAFARI",15],
["PALLMALL",10],["ORIS",15],["MAKALI",450],
["MURATINA",1200],["KEG",150],["KC (350)",350],
["KANE (300)",300],["CHROME (300)",300],["COUNTY (300)",300],
["CAP MORGAN (400)",400],["NEW C MORGAN",500],
["BEST WHISKEY (450)",450],["ALLSOPS",180],
["SMIRNOFF",250],["MANGO",300],["KK",300],
["V&A",400],["PILSNER",250],["FAXE",350],
["GUINNESS (250)",250],["TUSKER (250)",250],
["BALOZI",250],["WHITE CAP",250],
["T CIDER",270],["HUNTERS (450)",450],
["BLUE ICE",200],["G MEAKING 700ML",900],
["KC (1000)",1000],["KANE (900)",900],
["ORIGIN (900)",900],["CHROME (900)",900],
["COUNTY (900)",900],["C MORGAN (1200)",1200],
["KIBAO (900)",900],["GILBEYS (1550)",1550],
["VICEROY (1550)",1550],["BEST GIN (900)",900],
["BEST WHISKEY (1200)",1200]
];

const table = document.getElementById("table");

items.forEach((it,i)=>{
let r = table.insertRow();
r.innerHTML = `
<td>${it[0]}</td>
<td><input type="number" step="0.01" id="o${i}"></td>
<td><input type="number" step="0.01" id="a${i}" oninput="calc()"></td>
<td id="t${i}">0</td>
<td><input type="number" step="0.01" id="s${i}" oninput="calc()"></td>
<td>${it[1]}</td>
<td id="c${i}">0</td>
<td id="amt${i}">0</td>`;
});

let mpesaArr=[];

function calc(){
let totalSales=0;

items.forEach((it,i)=>{
let o=Number(document.getElementById("o"+i).value)||0;
let a=Number(document.getElementById("a"+i).value)||0;
let s=Number(document.getElementById("s"+i).value)||0;

let total=o+a;
let closing=total-s;
let amt=s*it[1];

document.getElementById("t"+i).innerText=total;
document.getElementById("c"+i).innerText=closing;
document.getElementById("amt"+i).innerText=amt;

totalSales+=amt;
});

document.getElementById("totalSales").innerText=totalSales;

finalCalc();
}

function addExpense(){
let div=document.createElement("div");
div.innerHTML=`<input type="number" step="0.01" oninput="calcExpenses()">`;
document.getElementById("expenses").appendChild(div);
}

function calcExpenses(){
let total=0;
document.querySelectorAll("#expenses input").forEach(e=>{
total+=Number(e.value)||0;
});
document.getElementById("totalExpenses").innerText=total;
finalCalc();
}

function addMpesa(){
let val=Number(document.getElementById("mpesaInput").value)||0;
if(val==0)return;

mpesaArr.unshift(val);

let list="";
mpesaArr.slice(0,20).forEach(v=>{
list+=`<div>${v}</div>`;
});

document.getElementById("mpesaList").innerHTML=list;

let total=mpesaArr.reduce((a,b)=>a+b,0);
document.getElementById("mpesaTotal").innerText=total;

document.getElementById("mpesaInput").value="";

finalCalc();
}

function finalCalc(){
let totalSales=Number(document.getElementById("totalSales").innerText)||0;
let expenses=Number(document.getElementById("totalExpenses").innerText)||0;
let mpesa=Number(document.getElementById("mpesaTotal").innerText)||0;
let cash=Number(document.getElementById("cash").value)||0;

let required=totalSales-expenses;
let income=cash+mpesa;

document.getElementById("required").innerText=required;
document.getElementById("income").innerText=income;

let diff=income-required;

if(diff>0){
document.getElementById("result").innerText="TIP: "+diff;
}else if(diff<0){
document.getElementById("result").innerText="SHORT: "+diff;
}else{
document.getElementById("result").innerText="BALANCED";
}
}

</script>

</body>
</html>
