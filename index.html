<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bar System</title>

<style>
body { font-family: Arial; padding: 10px; }
table { width: 100%; border-collapse: collapse; }
td, th { border: 1px solid #ccc; padding: 4px; text-align: center; }
input { width: 70px; }
.section { margin-top: 20px; }
button { padding: 8px; margin-top: 5px; }
.box { border:1px solid #ccc; padding:10px; margin-top:10px; }
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, addDoc, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDWmrVQNOpYSLJVt3s_ahq5yBkiykn1qtw",
  authDomain: "bar-system-6b7a3.firebaseapp.com",
  projectId: "bar-system-6b7a3",
  storageBucket: "bar-system-6b7a3.firebasestorage.app",
  messagingSenderId: "823216455050",
  appId: "1:823216455050:web:491e401ad569da3808dc73"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function unlockInputs(){
  document.querySelectorAll("input").forEach(i=> i.disabled = false);
}

function lockInputs(){
  document.querySelectorAll("input").forEach(i=> i.disabled = true);
}

async function loadLastStock(){
unlockInputs();

const q = query(collection(db, "records"), orderBy("time", "desc"), limit(1));
const snapshot = await getDocs(q);

if(snapshot.empty) return;

let last = snapshot.docs[0].data();
if(!last.stock) return;

last.stock.forEach((item,i)=>{
document.getElementById("o"+i).value = item.closing || 0;
});

calc();
}

window.onload = loadLastStock;

// 🔥 DASHBOARD FUNCTION
async function loadDashboard(){

const snapshot = await getDocs(collection(db, "records"));

let sales=0, expenses=0, mpesa=0, cash=0, tip=0, short=0;

snapshot.forEach(doc=>{
let d = doc.data();

sales += Number(d.totalSales)||0;
expenses += Number(d.expenses)||0;
mpesa += Number(d.mpesa)||0;
cash += Number(d.cash)||0;

let res = d.result || "";

if(res.includes("TIP")){
tip += Number(res.replace("TIP:",""))||0;
}

if(res.includes("SHORT")){
short += Number(res.replace("SHORT:",""))||0;
}
});

document.getElementById("dSales").innerText = sales;
document.getElementById("dExpenses").innerText = expenses;
document.getElementById("dMpesa").innerText = mpesa;
document.getElementById("dCash").innerText = cash;
document.getElementById("dTip").innerText = tip;
document.getElementById("dShort").innerText = short;

}

async function loadRecords(){

const snapshot = await getDocs(collection(db, "records"));

let html = "";

snapshot.forEach(doc=>{
let d = doc.data();

html += `<div onclick="viewRecord('${doc.id}')" style="border:1px solid #ccc; margin:5px; padding:5px; cursor:pointer;">
${d.date} — ${d.worker} — ${d.result}
</div>`;
});

document.getElementById("records").innerHTML = html;

// 🔥 CALL DASHBOARD
loadDashboard();
}

window.loadRecords = loadRecords;

async function viewRecord(id){

const snapshot = await getDocs(collection(db, "records"));

let selected;

snapshot.forEach(doc=>{
if(doc.id === id){
selected = doc.data();
}
});

if(!selected) return;

document.getElementById("worker").value = selected.worker;
document.getElementById("date").value = selected.date;

items.forEach((it,i)=>{
document.getElementById("o"+i).value = selected.stock[i]?.opening || 0;
document.getElementById("a"+i).value = selected.stock[i]?.added || 0;
document.getElementById("s"+i).value = selected.stock[i]?.sold || 0;
});

calc();
lockInputs();
}

window.viewRecord = viewRecord;

async function saveData(){

let worker = document.getElementById("worker").value;
let date = document.getElementById("date").value;

if(!worker || !date){
alert("Enter worker name and date");
return;
}

if(!confirm("Save this record?")) return;

let stock = [];

items.forEach((it,i)=>{
stock.push({
item: it[0],
opening: document.getElementById("o"+i).value,
added: document.getElementById("a"+i).value,
sold: document.getElementById("s"+i).value,
closing: document.getElementById("c"+i).innerText
});
});

let data = {
worker,
date,
stock,
totalSales: document.getElementById("totalSales").innerText,
expenses: document.getElementById("totalExpenses").innerText,
mpesa: document.getElementById("mpesaTotal").innerText,
cash: document.getElementById("cash").value,
result: document.getElementById("result").innerText,
time: Date.now()
};

await addDoc(collection(db, "records"), data);

alert("Saved to database!");
}

window.saveData = saveData;
</script>
</head>

<body>

<h2>Bar Daily Record</h2>
  
<button onclick="loadRecords()">View Records</button>
<div id="records"></div>

<!-- 🔥 DASHBOARD UI -->
<div class="box">
<h3>Owner Dashboard</h3>
<div>Total Sales: <span id="dSales">0</span></div>
<div>Total Expenses: <span id="dExpenses">0</span></div>
<div>Total MPesa: <span id="dMpesa">0</span></div>
<div>Total Cash: <span id="dCash">0</span></div>
<div>Total Tip: <span id="dTip">0</span></div>
<div>Total Short: <span id="dShort">0</span></div>
</div>
  
Worker: <input id="worker"><br><br>
Date: <input type="date" id="date"><br>

<div class="section">
<h3>Stock</h3>

<table id="table">
<tr>
<th>Item</th><th>Opening</th><th>Add</th><th>Total</th>
<th>Sales</th><th>Price</th><th>Closing</th><th>Amount</th>
</tr>
</table>

<h3>Total Sales: <span id="totalSales">0</span></h3>
</div>

<div class="section box">
<h3>Expenses</h3>
<div id="expenses"></div>
<button onclick="addExpense()">Add Expense</button>
<h4>Total Expenses: <span id="totalExpenses">0</span></h4>
</div>

<div class="section box">
<h3>MPesa</h3>
<input type="number" id="mpesaInput" step="0.01">
<button onclick="addMpesa()">Add</button>

<div id="mpesaList"></div>

<h4>Total MPesa: <span id="mpesaTotal">0</span></h4>
</div>

<div class="section box">
Cash: <input type="number" id="cash" step="0.01" oninput="finalCalc()"><br><br>

<h4>Required: <span id="required">0</span></h4>
<h4>Total Income: <span id="income">0</span></h4>
<h3 id="result"></h3>
<button onclick="saveData()">Save Day</button>
</div>
